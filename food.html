<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KATA — Typical Foods</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg-top:#eaf9d5;
      --bg-bottom:#b8e3b5;
      --brand:#0b6b56;
      --brand-2:#16a085;
      --ink:#133029;
      --muted:#5f6f66;
      --card:#ffffff;
      --ring:#cfead1;
      --shadow:0 10px 30px rgba(11,107,86,.15);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink);background:linear-gradient(180deg,var(--bg-top),var(--bg-bottom)) fixed}

    /* ===== HEADER / NAVBAR (sesuai spesifikasi) ===== */
    header{
      position:sticky;top:0;z-index:40;
      background:rgba(255,255,255,.9);
      backdrop-filter:blur(10px);
      border-bottom:1px solid #e5efe7;
    }
    .nav{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;max-width:1120px;margin:0 auto}
    .logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--ink);font-weight:800}
    .logo img{height:40px}
    .navlinks{display:flex;gap:16px}
    .navlinks a{font-weight:600;position:relative;text-decoration:none;color:var(--ink);padding:8px 4px;border-radius:8px}
    .navlinks a::after{
      content:"";position:absolute;left:0;right:0;bottom:-6px;height:2px;
      background:linear-gradient(90deg,var(--brand),var(--brand-2));
      transform:scaleX(0);transform-origin:left;transition:.25s
    }
    .navlinks a:hover::after{transform:scaleX(1)}
    .navlinks a.active{color:var(--brand)}
    .nav-toggle{display:none;cursor:pointer;font-size:24px;background:none;border:0;color:#0b3f33;margin-left:auto}

    /* MOBILE DROPDOWN */
    @media (max-width:768px){
      .nav-toggle{display:block}
      .navlinks{
        position:absolute;top:60px;right:20px;left:20px;background:#fff;flex-direction:column;gap:14px;
        border-radius:12px;box-shadow:var(--shadow);overflow:hidden;max-height:0;opacity:0;
        transition:max-height .35s ease, opacity .35s ease;padding:0 14px
      }
      .navlinks.show{display:flex;max-height:400px;opacity:1;padding:10px 14px}
    }

    /* PAGE HEADER */
    .hero{max-width:1120px;margin:18px auto 0;padding:0 20px 10px}
    .title{font-size:26px;font-weight:800;margin:6px 0 2px}
    .subtitle{color:var(--muted);margin:0 0 12px}
    @media(min-width:640px){.title{font-size:30px}}

    /* FILTERS */
    .filters{display:grid;grid-template-columns:1fr;gap:10px;max-width:1120px;margin:0 auto 8px;padding:0 20px}
    .filters .row{display:grid;grid-template-columns:1fr;gap:10px}
    .input,.select{width:100%;padding:12px 14px;border:1px solid var(--ring);border-radius:14px;background:#fff;font-size:14px;outline:none}
    .select{appearance:none;background-image:url('data:image/svg+xml;utf8,<svg fill="%23133029" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5"/></svg>');background-repeat:no-repeat;background-position:right 12px center;background-size:18px}
    @media(min-width:640px){.filters .row{grid-template-columns:1fr 320px}}

    /* GRID & CARD */
    .grid{max-width:1120px;margin:8px auto 30px;padding:0 20px;display:grid;grid-template-columns:1fr;gap:14px}
    @media(min-width:720px){.grid{grid-template-columns:1fr 1fr}}
    @media(min-width:1024px){.grid{grid-template-columns:1fr 1fr 1fr}}
    .card{background:var(--card);border:1px solid #e7f4e6;border-radius:18px;box-shadow:0 6px 20px rgba(11,107,86,.06);overflow:hidden;display:flex;flex-direction:column}
    .thumb{width:100%;aspect-ratio:16/10;background:#f2fff4;object-fit:cover}
    .content{padding:12px 14px 8px;display:flex;flex-direction:column;gap:8px}
    .badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#0b6b56;background:#e8f7ef;border:1px solid #c8eadc;border-radius:999px;padding:6px 10px;width:max-content}
    .title-food{font-weight:700;font-size:16px;margin:2px 0}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:9px 12px;border-radius:12px;border:1px solid var(--ring);background:#fff;text-decoration:none;color:var(--brand);font-weight:600;font-size:13px}
    .btn.primary{background:linear-gradient(180deg,#1bbf93,#0b6b56);color:#fff;border-color:#0b6b56}
    details{border:1px dashed #d9eedc;border-radius:12px;padding:8px 10px;background:#fbfffc}
    details summary{cursor:pointer;font-weight:700;color:var(--brand)}
    .recipe{font-size:13px;line-height:1.5;margin-top:6px}
    .recipe ul{margin:6px 0 6px 20px;padding:0}

    .empty{max-width:1120px;margin:16px auto;padding:0 20px;color:var(--muted)}

    /* ===== FOOTER (sesuai spesifikasi) ===== */
    footer{
      background:linear-gradient(180deg,var(--bg-bottom),#9ed7b1);
      margin-top:36px;color:#0b3f33
    }
    footer .wrap{
      max-width:1120px;margin:0 auto;padding:20px;display:grid;gap:12px;text-align:center
    }
    footer img{height:60px;justify-self:center}
  </style>
</head>

    // Prefix yang akan dicoba otomatis untuk menangani file di root / subfolder
  const IMG_PREFIXES = ["", "../", "../../"];

  function attachSmartLoader(imgEl, rawPath) {
    let i = 0;
    const fallback = "https://images.unsplash.com/photo-1504754524776-8f4f37790ca0?q=80&w=1200&auto=format&fit=crop";

    function tryNext() {
      if (i < IMG_PREFIXES.length) {
        imgEl.src = IMG_PREFIXES[i] + rawPath;
        i += 1;
      } else {
        imgEl.onerror = null;            // hentikan loop error
        imgEl.src = fallback;            // fallback terakhir
      }
    }

    imgEl.onerror = tryNext;
    tryNext(); // mulai percobaan pertama
  }

  function render(list){
    grid.innerHTML='';
    if(!list.length){empty.hidden=false;return;}
    empty.hidden=true;

    list.forEach(item=>{
      // path mentah dari data (cukup isi 'images/foods/xxx.jpg')
      const rawImgPath = item.img || (`images/foods/${slug(item.name)}.jpg`);

      const el=document.createElement('article');
      el.className='card';
      el.innerHTML=`
        <img class="thumb" alt="${item.name}">
        <div class="content">
          <span class="badge">${item.province}</span>
          <div class="title-food">${item.name}</div>
          <div class="actions">
            <a class="btn primary" href="${item.youtube}" target="_blank" rel="noopener">Tonton di YouTube</a>
            <a class="btn" href="#!" onclick="this.closest('.content').querySelector('details').open = !this.closest('.content').querySelector('details').open; return false;">Lihat Resep</a>
          </div>
          <details>
            <summary>Resep singkat</summary>
            <div class="recipe">
              <b>Bahan:</b>
              <ul>${item.recipe.ingredients.map(x=>`<li>${x}</li>`).join('')}</ul>
              <b>Cara:</b>
              <ul>${item.recipe.steps.map(x=>`<li>${x}</li>`).join('')}</ul>
            </div>
          </details>
        </div>`;
      grid.appendChild(el);

      // pasang smart loader ke img
      const imgEl = el.querySelector('img.thumb');
      attachSmartLoader(imgEl, rawImgPath);
    });
  }

  function applyFilter(){
    const text=q.value.trim().toLowerCase();
    const pick=prov.value;
    const res=FOODS.filter(f=>{
      const hitText=!text||(f.name.toLowerCase().includes(text)||f.province.toLowerCase().includes(text));
      const hitProv=!pick||f.province===pick;
      return hitText && hitProv;
    });
    render(res);
  }

  // isi dropdown provinsi
  [...new Set(FOODS.map(f=>f.province))].sort().forEach(p=>{
    const opt=document.createElement('option');opt.value=p;opt.textContent=p;prov.appendChild(opt);
  });

  q.addEventListener('input',applyFilter);
  prov.addEventListener('change',applyFilter);

  render(FOODS);

  // deep link ?prov=
  const urlParams=new URLSearchParams(location.search);
  const p=urlParams.get('prov'); if(p){prov.value=p;applyFilter();}
</script>

</body>
</html>
