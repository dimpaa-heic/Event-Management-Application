<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KATA — Traditional Stories</title>
  <style>
    :root{
      --bg-top:#eaf9d5; --bg-bottom:#b8e3b5;
      --ink:#133029; --muted:#5f6f66;
      --brand:#0b6b56; --brand-2:#16a085;
      --ring:#e7ede7; --paper:#fff; --shadow:0 10px 28px rgba(17,43,33,.18);
      --radius:18px; --header-h:66px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;font-family:Poppins,system-ui,Arial;background:linear-gradient(180deg,var(--bg-top),var(--bg-bottom));color:var(--ink)}
    a{color:inherit;text-decoration:none}
/* Navbar */
header{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid #e5efe7}
.nav{display:flex;align-items:center;justify-content:space-between;padding:10px 20px}
.logo{display:flex;align-items:center;gap:8px}
.logo img{height:40px}
.navlinks{display:flex;gap:16px}
.navlinks a{font-weight:600;position:relative}
.navlinks a::after{content:"";position:absolute;left:0;right:0;bottom:-6px;height:2px;background:linear-gradient(90deg,var(--brand),var(--brand-2));transform:scaleX(0);transform-origin:left;transition:.25s}
.navlinks a:hover::after{transform:scaleX(1)}
.nav-toggle{display:none;cursor:pointer;font-size:24px;background:none;border:0;color:#0b3f33;margin-left:auto}
@media(max-width:768px){
  .nav-toggle{display:block}
  .navlinks{position:absolute;top:60px;right:20px;left:20px;background:#fff;flex-direction:column;gap:14px;border-radius:12px;box-shadow:var(--shadow);overflow:hidden;max-height:0;opacity:0;transition:max-height .35s ease,opacity .35s ease}
  .navlinks.show{display:flex;max-height:400px;opacity:1}
}

    /* SECTION */
    .section{max-width:1120px;margin:0 auto;padding:22px 16px}
    h2{margin:4px 0 14px;color:#0b3f33}

    /* FILTER BAR */
    .filterbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
    .input{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--ring);border-radius:999px;padding:10px 14px}
    .input input{border:0;outline:0;min-width:220px}
    .input select{border:0;outline:0;background:transparent}
    .chip{font-size:12px;font-weight:700;color:#0b3f33;background:#eaf7ef;border:1px solid var(--ring);border-radius:999px;padding:4px 8px}
    .btn{border:0;border-radius:999px;padding:10px 16px;cursor:pointer;font-weight:700;box-shadow:var(--shadow);background:#fff}
    .btn:hover{background:#effaf5}
    .btn-primary{background:var(--brand);color:#fff}
    .btn-primary:hover{filter:brightness(1.05)}

    /* GRID CARDS */
    .grid{display:grid;gap:14px;grid-template-columns:repeat(3,minmax(0,1fr))}
    @media (max-width:980px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media (max-width:640px){.grid{grid-template-columns:1fr}}
    .card{background:var(--paper);border:1px solid var(--ring);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
    .pic{position:relative;aspect-ratio:16/9;background:#eaf7ef center/cover no-repeat}
    .emoji-fallback{position:absolute;inset:0;display:grid;place-items:center;font-size:56px}
    .body{padding:12px 14px;display:grid;gap:6px}
    .title{margin:0;color:#0b3f33}
    .meta{color:var(--muted);font-size:13.5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .syn{font-size:14px}
    .fun{font-size:13.5px;background:#f6faf7;border:1px solid #e8f0ea;border-radius:10px;padding:8px 10px}
    .actions{display:flex;justify-content:flex-end;padding:10px 14px 14px}

    /* MODAL */
    .modal{position:fixed;inset:0;z-index:70;display:none}
    .modal.show{display:block}
    .backdrop{position:absolute;inset:0;background:rgba(0,0,0,.25)}
    .sheet{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(760px,92vw);background:#fff;border:1px solid var(--ring);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}
    .sheet-head{display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid var(--ring)}
    .sheet-head .thumb{width:68px;height:68px;border-radius:12px;background:#f6faf7;display:grid;place-items:center;font-size:40px;border:1px solid #e8f0ea}
    .sheet-body{padding:12px 14px}
    .close{margin-left:auto;border:1px solid var(--ring);background:#fff;border-radius:999px;width:34px;height:34px;cursor:pointer}
  </style>
</head>
<body>

<!-- NAV -->
<header>
  <div class="nav">
    <div class="logo"><img src="images/logo.png" alt="KATA logo"><b>KATA</b></div>
    <button class="nav-toggle" id="navToggle">☰</button>
    <div class="navlinks" id="navLinks">
      <a href="index.html" class="active">Home</a>
      <a href="daily.html">Daily Lokal</a>
      <a href="bumi.html">Bumi Words</a>
      <a href="legenda.html">LegendaQu</a>
      <a href="auth.html">Account</a>
    </div>
  </div>
</header>

  <section class="section">
    <h2>Traditional Stories</h2>

    <!-- FILTERS -->
    <div class="filterbar">
      <div class="input"><span>🔎</span><input id="q" type="search" placeholder="Cari cerita atau permainan…"></div>
      <div class="input"><span>🌏</span>
        <select id="prov">
          <option value="" selected>Semua provinsi</option>
          <option value="aceh">Aceh</option>
          <option value="sumatera-utara">Sumatera Utara</option>
          <option value="sumatera-barat">Sumatera Barat</option>
          <option value="riau">Riau</option>
          <option value="kepulauan-riau">Kepulauan Riau</option>
          <option value="jambi">Jambi</option>
          <option value="sumatera-selatan">Sumatera Selatan</option>
          <option value="bangka-belitung">Bangka Belitung</option>
          <option value="bengkulu">Bengkulu</option>
          <option value="lampung">Lampung</option>
          <option value="banten">Banten</option>
          <option value="dki-jakarta">DKI Jakarta</option>
          <option value="jawa-barat">Jawa Barat</option>
          <option value="jawa-tengah">Jawa Tengah</option>
          <option value="diyogyakarta">DI Yogyakarta</option>
          <option value="jawa-timur">Jawa Timur</option>
          <option value="bali">Bali</option>
          <option value="ntb">Nusa Tenggara Barat</option>
          <option value="ntt">Nusa Tenggara Timur</option>
          <option value="kalimantan-barat">Kalimantan Barat</option>
          <option value="kalimantan-tengah">Kalimantan Tengah</option>
          <option value="kalimantan-selatan">Kalimantan Selatan</option>
          <option value="kalimantan-timur">Kalimantan Timur</option>
          <option value="kalimantan-utara">Kalimantan Utara</option>
          <option value="sulawesi-utara">Sulawesi Utara</option>
          <option value="gorontalo">Gorontalo</option>
          <option value="sulawesi-tengah">Sulawesi Tengah</option>
          <option value="sulawesi-barat">Sulawesi Barat</option>
          <option value="sulawesi-tenggara">Sulawesi Tenggara</option>
          <option value="sulawesi-selatan">Sulawesi Selatan</option>
          <option value="maluku">Maluku</option>
          <option value="maluku-utara">Maluku Utara</option>
          <option value="papua">Papua</option>
          <option value="papua-barat">Papua Barat</option>
          <option value="papua-barat-daya">Papua Barat Daya</option>
          <option value="papua-tengah">Papua Tengah</option>
          <option value="papua-pegunungan">Papua Pegunungan</option>
          <option value="papua-selatan">Papua Selatan</option>
        </select>
      </div>
      <div class="input"><span>🏷️</span>
        <select id="ctype" aria-label="Pilih jenis">
          <option value="">All types</option>
          <option value="fairy_tale">Fairy Tales</option>
          <option value="legend">Legends</option>
          <option value="local_game">Local Games</option>
        </select>
      </div>
      <button id="reset" class="btn">Reset</button>
    </div>

    <!-- GRID -->
    <div id="grid" class="grid"></div>
    <div id="empty" class="meta" style="display:none;margin-top:8px">Tidak ada hasil. Coba ganti kata kunci / filter.</div>
  </section>

  <!-- MODAL DETAIL -->
  <div id="modal" class="modal" aria-hidden="true">
    <div class="backdrop" data-close></div>
    <div class="sheet" role="dialog" aria-modal="true">
      <div class="sheet-head">
        <div class="thumb" id="mThumb">📖</div>
        <div>
          <h3 id="mTitle" style="margin:0"></h3>
          <div id="mMeta" class="meta"></div>
        </div>
        <button class="close" title="Close" data-close>✕</button>
      </div>
      <div class="sheet-body" id="mBody"></div>
    </div>
  </div>

  <script>
  // ====== DATA (contoh, bisa kamu tambah) ======
  // Gunakan slug provinsi seperti pada <option value="..."> agar filter cocok.
  const STORIES = [
    // Legends
    { id:'malin-kundang', type:'legend', title:'Malin Kundang', province:'sumatera-barat', region:'Sumatera Barat',
      image:'images/stories/malin-kundang.jpg',
      synopsis:'Anak durhaka dikutuk jadi batu.', fun:'Ada batu mirip manusia di Pantai Air Manis.',
      story:`Malin menolak mengakui ibunya ketika sudah kaya; doa sang ibu mengutuknya menjadi batu.` },

    { id:'danau-toba', type:'legend', title:'Asal-usul Danau Toba', province:'sumatera-utara', region:'Sumatera Utara',
      image:'images/stories/danau-toba.jpg',
      synopsis:'Rahasia asal istri nelayan memicu banjir besar.', fun:'Larangan membuka jati diri muncul di banyak versi.',
      story:`Nelayan melanggar janji untuk tidak membuka rahasia bahwa istrinya jelmaan ikan; banjir membentuk Danau Toba & Pulau Samosir.` },

    { id:'sangkuriang', type:'legend', title:'Sangkuriang', province:'jawa-barat', region:'Jawa Barat',
      image:'images/stories/tangkuban-parahu.jpg',
      synopsis:'Perahu terbalik jadi gunung.', fun:'Dikaitkan dengan Gunung Tangkuban Parahu.',
      story:`Syarat seribu pekerjaan gagal dipenuhi; perahu ditendang hingga terbalik menjadi gunung.` },

    { id:'roro-jonggrang', type:'legend', title:'Roro Jonggrang', province:'diyogyakarta', region:'DI Yogyakarta',
      image:'images/stories/prambanan.jpg',
      synopsis:'Seribu candi dalam semalam & kutukan arca.', fun:'“Candi Seribu” dilekatkan pada kompleks Prambanan.',
      story:`Roro Jonggrang menipu Bandung Bondowoso; ia dikutuk menjadi arca.` },

    // Fairy tales
    { id:'timun-mas', type:'fairy_tale', title:'Timun Mas', province:'jawa-tengah', region:'Jawa Tengah',
      image:'',
      synopsis:'Gadis dikejar raksasa, selamat berkat benda ajaib.', fun:'Biji timun, jarum, garam, terasi jadi rintangan.',
      story:`Timun Mas melempar benda dari pertapa—berubah jadi hutan, pegunungan, laut, lumpur panas—hingga raksasa kalah.` },

    { id:'keong-mas', type:'fairy_tale', title:'Keong Mas', province:'jawa-timur', region:'Jawa Timur',
      image:'',
      synopsis:'Putri disihir jadi keong; kebaikan membebaskan.', fun:'Ada versi Dewi Candra Kirana.',
      story:`Keong dirawat nenek; diam-diam berubah putri dan membantu. Kutukan pun patah.` },

    { id:'bawang-merah-putih', type:'fairy_tale', title:'Bawang Merah Bawang Putih', province:'riau', region:'Riau',
      image:'',
      synopsis:'Si baik vs si iri; kebaikan berbuah bahagia.', fun:'Motif populer di banyak daerah.',
      story:`Bawang Putih diperlakukan tidak adil; kebaikannya menolong. Keserakahan Bawang Merah berbalik menyusahkan.` },

    // Local games
    { id:'congklak', type:'local_game', title:'Congklak (Dakón)', province:'banten', region:'Banten / Jawa',
      image:'images/games/congklak.jpg',
      synopsis:'Permainan papan & biji dengan strategi memindahkan biji ke lumbung.', fun:'Nama lain: congkak, sungka.',
      story:`Dua pemain bergiliran mengedarkan biji ke lubang dan menyimpan di lumbung sendiri. Menang jika biji di lumbung paling banyak.` },

    { id:'gobak-sodor', type:'local_game', title:'Gobak Sodor', province:'diyogyakarta', region:'Jawa (DIY & sekitarnya)',
      image:'images/games/gobak-sodor.jpg',
      synopsis:'Permainan kejar-lari tim; cegat lawan melewati garis.', fun:'Di beberapa daerah disebut “galah asin”.',
      story:`Dua tim bergantian sebagai penjaga & penyerang. Penyerang menang jika semua bisa menyeberang bolak-balik.` },

    { id:'engklek', type:'local_game', title:'Engklek', province:'jawa-barat', region:'Jawa Barat',
      image:'images/games/engklek.jpg',
      synopsis:'Melompat satu kaki melewati petak di tanah.', fun:'Pola petak beragam; digambar pakai kapur/batu.',
      story:`Pemain melempar gaco ke petak lalu melompat satu kaki melewati urutan tanpa menginjak garis.` },

    { id:'gasing', type:'local_game', title:'Gasing', province:'kepulauan-riau', region:'Kepulauan Riau',
      image:'images/games/gasing.jpg',
      synopsis:'Memutar gasing dengan tali—adu lama berputar.', fun:'Ada festival gasing di Kepulauan Riau.',
      story:`Gasing dililit tali lalu ditarik kuat sambil dilempar. Menang bila putaran stabil & terlama.` }
  ];

  const TYPE_LABEL = { fairy_tale:'Fairy Tale', legend:'Legend', local_game:'Local Game' };

  // ====== RENDER GRID ======
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const q = document.getElementById('q');
  const prov = document.getElementById('prov');
  const ctype = document.getElementById('ctype');
  const reset = document.getElementById('reset');

  function render(){
    const text = (q.value||'').toLowerCase().trim();
    const pv = (prov.value||'').trim();      // '' = semua provinsi
    const tp = (ctype.value||'').trim();     // '' = semua tipe

    const rows = STORIES.filter(x=>{
      const hay = `${x.title} ${x.region} ${x.synopsis} ${x.fun} ${x.story}`.toLowerCase();
      const hitText = !text || hay.includes(text);
      const hitProv = !pv || x.province === pv;
      const hitType = !tp || x.type === tp;
      return hitText && hitProv && hitType;
    });

    grid.innerHTML='';
    rows.forEach(x=>{
      const card=document.createElement('article'); card.className='card';

      const pic=document.createElement('div'); pic.className='pic';
      if(x.image){ pic.style.backgroundImage=`url('${x.image}')`; }
      else{ pic.innerHTML=`<div class="emoji-fallback">${x.emoji||'📖'}</div>`; }

      const body=document.createElement('div'); body.className='body';
      body.innerHTML = `
        <h3 class="title">${x.title}</h3>
        <div class="meta">
          <span>${x.region}</span>
          <span class="chip">${TYPE_LABEL[x.type]||'Story'}</span>
        </div>
        <div class="syn">${x.synopsis}</div>
        <div class="fun"><b>Fun fact:</b> ${x.fun}</div>`;

      const actions=document.createElement('div'); actions.className='actions';
      const btn=document.createElement('button'); btn.className='btn btn-primary';
      btn.textContent = x.type==='local_game' ? 'View details' : 'Read story';
      btn.onclick=()=>openModal(x);
      actions.appendChild(btn);

      card.appendChild(pic); card.appendChild(body); card.appendChild(actions);
      grid.appendChild(card);
    });

    empty.style.display = rows.length ? 'none' : 'block';
  }

  // ====== MODAL ======
  const modal = document.getElementById('modal');
  const mThumb = document.getElementById('mThumb');
  const mTitle = document.getElementById('mTitle');
  const mMeta  = document.getElementById('mMeta');
  const mBody  = document.getElementById('mBody');

  function openModal(x){
    mThumb.textContent = x.emoji || (x.type==='local_game' ? '🎮' : '📖');
    mTitle.textContent = x.title;
    mMeta.textContent  = `${x.region} • ${TYPE_LABEL[x.type]||'Story'}`;
    mBody.innerHTML = `
      <p style="margin:6px 0">${x.synopsis}</p>
      <div class="fun"><b>Fun fact:</b> ${x.fun}</div>
      <hr style="border:none;border-top:1px solid var(--ring);margin:12px 0">
      <p style="margin:0;white-space:pre-line">${x.story}</p>
      ${x.image ? `<div style="margin-top:10px;border:1px solid var(--ring);border-radius:12px;overflow:hidden">
        <img src="${x.image}" alt="${x.title}" style="display:block;width:100%;height:auto">
      </div>` : ''}`;
    modal.classList.add('show');
  }
  function closeModal(){ modal.classList.remove('show'); }
  modal.addEventListener('click', e=>{ if(e.target.hasAttribute('data-close')||e.target.classList.contains('backdrop')) closeModal(); });
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

  // ====== INIT: tampilkan SEMUA item di load awal ======
  prov.value = '';
  ctype.value = '';
  render();

  // ====== FILTER HANDLERS ======
  q.addEventListener('input', render);
  prov.addEventListener('change', render);
  ctype.addEventListener('change', render);
  reset.addEventListener('click', ()=>{ q.value=''; prov.value=''; ctype.value=''; render(); });
  </script>
</body>
</html>
