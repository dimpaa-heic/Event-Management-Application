<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KATA — SignUp / My Account</title>
  <style>
      :root{
      --bg-top:#eaf9d5; --bg-bottom:#b8e3b5;
      --brand:#0b6b56; --brand-2:#16a085;
      --ink:#133029; --muted:#5f6f66; --paper:#fff; --ring:#e7ede7;
      --shadow:0 10px 28px rgba(17,43,33,.18);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:'Poppins',system-ui,Arial;background:linear-gradient(180deg,var(--bg-top),var(--bg-bottom));color:var(--ink)}
    a{color:inherit;text-decoration:none}

    /* NAVBAR */
    header{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid #e5efe7}
    .nav{max-width:1120px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:16px}
    .logo{display:flex;align-items:center;gap:10px}
    .logo img{height:40px}
    .navlinks{margin-left:auto;display:flex;gap:22px}
    .navlinks a{font-weight:600;position:relative}
    .navlinks a::after{content:"";position:absolute;left:0;right:0;bottom:-6px;height:2px;background:linear-gradient(90deg,var(--brand),var(--brand-2));transform:scaleX(0);transform-origin:left;transition:.25s}
    .navlinks a:hover::after{transform:scaleX(1)}

    /* FORM */
    .section{max-width:400px;margin:40px auto;padding:24px 16px}
    .paper{background:var(--paper);border:1px solid var(--ring);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px}
    .section h2{text-align:center;color:#0b3f33;margin-bottom:16px}
    label{display:block;margin-top:10px;font-weight:600;color:var(--ink)}
    input{width:100%;padding:10px;border:1px solid var(--ring);border-radius:var(--radius);margin-top:6px}
    .btn{margin-top:14px;width:100%;padding:12px;border-radius:999px;border:0;cursor:pointer;font-weight:700;box-shadow:var(--shadow);transition:.2s}
    .btn-primary{background:var(--brand);color:#fff}
    .btn-primary:hover{transform:translateY(-1px);filter:brightness(1.05)}

    .toggle{margin-top:12px;text-align:center;font-size:14px;color:var(--muted)}
    .toggle a{color:var(--brand);font-weight:600}

    footer{background:linear-gradient(180deg,var(--bg-bottom),#9ed7b1);margin-top:40px;color:#0b3f33}
    footer .wrap{max-width:1120px;margin:0 auto;padding:20px;display:grid;gap:16px;text-align:center}
    footer img{height:60px;justify-self:center}
    footer p{max-width:600px;margin:0 auto}
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <header>
    <div class="nav">
      <div class="logo"><img src="images/logo.png" alt="KATA logo"><b>KATA</b></div>
      <div class="navlinks">
        <a href="index.html">Home</a>
        <a href="daily.html">Daily Lokal</a>
        <a href="bumi.html">Bumi Words</a>
        <a href="legenda.html">LegendaQu</a>
        <a href="auth.html">Account</a>
      </div>
    </div>
  </header>

  <!-- FORM AUTH -->
  <section class="section">
    <div class="paper">
      <h2 id="formTitle">Sign Up</h2>
      <form id="authForm">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Masukkan email" required>
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Masukkan password" required>
        <button type="submit" class="btn btn-primary">Sign Up</button>
      </form>
      <div class="toggle">
        <span id="toggleText">Sudah punya akun?</span>
        <a href="#" id="toggleLink">Login</a>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="wrap">
      <img src="images/logo.png" alt="KATA logo">
      <h2>KATA</h2>
      <p>KATA is an interactive platform to preserve Indonesian regional languages ​​in a fun and modern way.</p>
      <div style="font-size:14px;color:var(--muted)">© 2025 KATA. All rights reserved.</div>
    </div>
  </footer>

  <!-- JS -->
  <script>
    const form=document.getElementById("authForm");
    const formTitle=document.getElementById("formTitle");
    const toggleLink=document.getElementById("toggleLink");
    const toggleText=document.getElementById("toggleText");
    let isSignup=true;

    toggleLink.onclick=(e)=>{
      e.preventDefault();
      isSignup=!isSignup;
      formTitle.textContent=isSignup?"Sign Up":"Login";
      form.querySelector("button").textContent=isSignup?"Sign Up":"Login";
      toggleText.textContent=isSignup?"Sudah punya akun?":"Belum punya akun?";
      toggleLink.textContent=isSignup?"Login":"Sign Up";
    };

    form.onsubmit=(e)=>{
      e.preventDefault();
      const email=document.getElementById("email").value;
      const password=document.getElementById("password").value;
      alert(`${isSignup?"SignUp":"Login"} dengan:\nEmail: ${email}\nPassword: ${password}`);
      // 👉 nanti bagian ini bisa diganti integrasi Firebase Auth
    };
  </script>
</body>
</html>
