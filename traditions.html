<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>KATA — Traditional Traditions (Multimedia)</title>
<style>
  :root{
    --bg-top:#eaf9d5; --bg-bottom:#b8e3b5;
    --ink:#133029; --muted:#5f6f66;
    --brand:#0b6b56; --brand-2:#16a085;
    --ring:#e7ede7; --paper:#fff; --shadow:0 10px 28px rgba(17,43,33,.18);
    --radius:18px; --header-h:66px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:Poppins,system-ui,Arial;background:linear-gradient(180deg,var(--bg-top),var(--bg-bottom));color:var(--ink)}
  a{color:inherit;text-decoration:none}

/* Navbar */
header{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid #e5efe7}
.nav{display:flex;align-items:center;justify-content:space-between;padding:10px 20px}
.logo{display:flex;align-items:center;gap:8px}
.logo img{height:40px}
.navlinks{display:flex;gap:16px}
.navlinks a{font-weight:600;position:relative}
.navlinks a::after{content:"";position:absolute;left:0;right:0;bottom:-6px;height:2px;background:linear-gradient(90deg,var(--brand),var(--brand-2));transform:scaleX(0);transform-origin:left;transition:.25s}
.navlinks a:hover::after{transform:scaleX(1)}
.nav-toggle{display:none;cursor:pointer;font-size:24px;background:none;border:0;color:#0b3f33;margin-left:auto}
@media(max-width:768px){
  .nav-toggle{display:block}
  .navlinks{position:absolute;top:60px;right:20px;left:20px;background:#fff;flex-direction:column;gap:14px;border-radius:12px;box-shadow:var(--shadow);overflow:hidden;max-height:0;opacity:0;transition:max-height .35s ease,opacity .35s ease}
  .navlinks.show{display:flex;max-height:400px;opacity:1}
}

  /* SECTION */
  .section{max-width:1120px;margin:0 auto;padding:22px 16px}
  h2{margin:4px 0 14px;color:#0b3f33}

  /* FILTER BAR */
  .filterbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
  .input{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--ring);border-radius:999px;padding:10px 14px}
  .input input{border:0;outline:0;min-width:220px}
  .input select{border:0;outline:0;background:transparent}
  .btn{border:0;border-radius:12px;padding:10px 16px;cursor:pointer;font-weight:700;box-shadow:var(--shadow);background:#fff;transition:transform .08s ease, filter .12s ease}

  /* GRID CARDS */
  .grid{display:grid;gap:14px;grid-template-columns:repeat(3,minmax(0,1fr))}
  @media (max-width:980px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media (max-width:640px){.grid{grid-template-columns:1fr}}
  .card{background:var(--paper);border:1px solid var(--ring);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
  .pic{position:relative;aspect-ratio:16/9;background:#eaf7ef center/cover no-repeat}
  .body{padding:12px 14px;display:grid;gap:6px}
  .title{margin:0;color:#0b3f33}
  .meta{color:var(--muted);font-size:13.5px}
  .fun{font-size:13.5px;background:#f6faf7;border:1px solid #e8f0ea;border-radius:10px;padding:8px 10px}
  .actions{display:flex;justify-content:space-between;gap:8px;align-items:center;padding:10px 14px 14px}
  .chip{font-size:12px;background:#eaf7ef;border:1px solid var(--ring);color:#0b3f33;border-radius:999px;padding:4px 8px}

  /* TOMBOL UTAMA KONTRAS */
  .btn.btn-primary{
    background: linear-gradient(90deg, var(--brand), var(--brand-2));
    color:#fff;
    transition: transform .15s ease, filter .18s ease, box-shadow .18s ease;
  }
  .btn.btn-primary:hover{ filter:brightness(1.05); transform:translateY(-1px); box-shadow:0 10px 26px rgba(11,107,86,.2); }

  /* MODAL (scrollable content, body locked) */
  .modal{position:fixed;inset:0;z-index:70;display:none}
  .modal.show{display:block}
  .backdrop{position:absolute;inset:0;background:rgba(0,0,0,.45)}
  .sheet{
    position:absolute;left:50%;top:50%;
    transform:translate(-50%,-50%);
    width:min(980px,94vw);max-height:90vh;background:#fff;border:1px solid var(--ring);
    border-radius:18px;box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden
  }
  .sheet-head{display:flex;gap:12px;padding:12px;border-bottom:1px solid var(--ring);align-items:center}
  .sheet-head img{width:52px;height:52px;border-radius:12px;object-fit:cover;border:1px solid #e8f0ea}
  .sheet-body{padding:12px 14px;overflow:auto}
  .sheet-body > *{max-width:100%}
  .close{margin-left:auto;border:1px solid var(--ring);background:#fff;border-radius:999px;width:34px;height:34px;cursor:pointer}

  /* Player YouTube responsif */
  .video-wrap{position:relative;width:100%;padding-top:56.25%;border:1px solid var(--ring);border-radius:12px;overflow:hidden;background:#000}
  .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}

  .thumbs{display:flex;gap:8px;overflow:auto;padding-bottom:2px;margin-top:10px}
  .thumbs img{height:66px;border-radius:8px;border:1px solid var(--ring);cursor:pointer;opacity:.8}
  .thumbs img.active{outline:2px solid #18b095;opacity:1}
  .muted{color:#6b7d73;font-size:13px}
</style>
</head>

/* ====== RENDER GRID ====== */
const grid = document.getElementById('grid');
const empty = document.getElementById('empty');
const q = document.getElementById('q');
const prov = document.getElementById('prov');
const reset = document.getElementById('reset');

function render(){
  const text=(q.value||'').toLowerCase().trim();
  const pv=(prov.value||'').trim();

  const rows = DATA.filter(x=>{
    const hitText = !text || `${x.title} ${x.region} ${x.info} ${x.fun}`.toLowerCase().includes(text);
    const hitProv = !pv || x.province===pv;
    return hitText && hitProv;
  });

  grid.innerHTML='';
  rows.forEach(x=>{
    const card=document.createElement('article'); card.className='card';

    const pic=document.createElement('div'); pic.className='pic';
    if(x.image) pic.style.backgroundImage=`url('${x.image}')`;

    const body=document.createElement('div'); body.className='body';
    body.innerHTML=`
      <h3 class="title">${x.title}</h3>
      <div class="meta">${x.region}</div>
      <div class="info">${x.info}</div>
      <div class="fun"><b>Fun fact:</b> ${x.fun}</div>`;

    const actions=document.createElement('div'); actions.className='actions';
    const tag=document.createElement('span'); tag.className='chip'; tag.textContent=x.province.replace(/-/g,' ');
    const btn=document.createElement('button'); btn.className='btn btn-primary'; btn.textContent='Learn more';
    btn.onclick=()=>openModal(x);
    actions.appendChild(tag); actions.appendChild(btn);

    card.appendChild(pic); card.appendChild(body); card.appendChild(actions);
    grid.appendChild(card);
  });

  empty.style.display = rows.length ? 'none' : 'block';
}
q.addEventListener('input',render);
prov.addEventListener('change',render);
reset.addEventListener('click',()=>{ q.value=''; prov.value=''; render(); });

const mBody=document.getElementById('mBody');

function lockBody(lock){
  document.documentElement.style.overflow = lock ? 'hidden' : '';
  document.body.style.overflow = lock ? 'hidden' : '';
}

// --- helper: ambil ID YouTube valid ---
function extractYTID(str){
  if(!str) return null;
  const s = String(str).trim();
  if(/^[\w-]{11}$/.test(s)) return s; // already ID
  try{
    const u = new URL(s);
    if(u.hostname.includes('youtu.be')) return u.pathname.split('/')[1];
    if(u.searchParams.has('v')) return u.searchParams.get('v');
    if(u.pathname.includes('/shorts/')) return u.pathname.split('/shorts/')[1].split('/')[0];
    if(u.pathname.includes('/embed/')) return u.pathname.split('/embed/')[1].split('/')[0];
  }catch(e){}
  return null;
}

function openModal(x){
  lockBody(true);
  mThumb.src = x.image || 'images/logo.png';
  mThumb.alt = x.title;
  mTitle.textContent = x.title;
  mMeta.textContent = x.region;

  // Normalisasi semua kandidat yt -> ID valid
  const vids = (Array.isArray(x.yt) ? x.yt : [])
    .map(extractYTID)
    .filter(Boolean);

  let videoHTML = '';
  if(vids.length){
    const first = vids[0];
    videoHTML = `
      <div class="video-wrap" style="margin-top:20px">
        <iframe id="ytFrame" src="https://www.youtube.com/embed/${first}?rel=0&modestbranding=1&playsinline=1"
          allowfullscreen
          allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture; web-share"></iframe>
      </div>
      ${vids.length>1?`<div class="thumbs">
        ${vids.map((id,i)=>`<img data-id="${id}" class="${i===0?'active':''}" src="https://i.ytimg.com/vi/${id}/mqdefault.jpg" alt="video ${i+1}">`).join('')}
      </div>`:''}
      <div class="muted">Sumber video: YouTube</div>`;
  }else{
    const qs = encodeURIComponent(x.title + ' tradisi');
    videoHTML = `
      <div class="video-wrap">
        <iframe src="https://www.youtube.com/embed?listType=search&list=${qs}&rel=0&modestbranding=1&playsinline=1"
          allowfullscreen
          allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture; web-share"></iframe>
      </div>
      <div class="muted">Hasil pencarian YouTube untuk “${x.title}”.</div>`;
  }

  mBody.innerHTML = `
    <p style="margin:6px 0">${x.info}</p>
    <div class="fun"><b>Fun fact:</b> ${x.fun}</div>
    ${x.image ? `<div style="margin:12px 0;border:1px solid var(--ring);border-radius:12px;overflow:hidden"><img src="${x.image}" alt="${x.title}" style="display:block;width:100%;height:auto"></div>`:''}
    ${videoHTML}
  `;

  // Wiring thumbnails -> swap src player
  const frame = document.getElementById('ytFrame');
  if(frame){
    mBody.querySelectorAll('.thumbs img').forEach(img=>{
      img.addEventListener('click',()=>{
        const id=img.dataset.id;
        frame.src=`https://www.youtube.com/embed/${id}?rel=0&modestbranding=1&playsinline=1`;
        mBody.querySelectorAll('.thumbs img').forEach(t=>t.classList.remove('active'));
        img.classList.add('active');
      });
    });
  }

  modal.classList.add('show');
}

function closeModal(){ modal.classList.remove('show'); lockBody(false); }
modal.addEventListener('click',e=>{ if(e.target.hasAttribute('data-close')||e.target.classList.contains('backdrop')) closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

render();
</script>
</body>
</html>
