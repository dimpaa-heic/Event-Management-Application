<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KATA — Category</title>
  <style>
    :root{--bg-top:#eaf9d5; --bg-bottom:#b8e3b5; --ring:#e7ede7; --ink:#133029; --brand:#0b6b56; --shadow:0 10px 28px rgba(17,43,33,.18)}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Poppins',system-ui,Arial;background:linear-gradient(180deg,var(--bg-top),var(--bg-bottom));color:var(--ink)}
    a{color:inherit;text-decoration:none}
    header{position:sticky;top:0;z-index:60;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid #e5efe7}
    /* Navbar */
header{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid #e5efe7}
.nav{display:flex;align-items:center;justify-content:space-between;padding:10px 20px}
.logo{display:flex;align-items:center;gap:8px}
.logo img{height:40px}
.navlinks{display:flex;gap:16px}
.navlinks a{font-weight:600;position:relative}
.navlinks a::after{content:"";position:absolute;left:0;right:0;bottom:-6px;height:2px;background:linear-gradient(90deg,var(--brand),var(--brand-2));transform:scaleX(0);transform-origin:left;transition:.25s}
.navlinks a:hover::after{transform:scaleX(1)}
.nav-toggle{display:none;cursor:pointer;font-size:24px;background:none;border:0;color:#0b3f33;margin-left:auto}
@media(max-width:768px){
  .nav-toggle{display:block}
  .navlinks{position:absolute;top:60px;right:20px;left:20px;background:#fff;flex-direction:column;gap:14px;border-radius:12px;box-shadow:var(--shadow);overflow:hidden;max-height:0;opacity:0;transition:max-height .35s ease,opacity .35s ease}
  .navlinks.show{display:flex;max-height:400px;opacity:1}
}
    .burger{display:none;margin-left:auto;background:transparent;border:0;padding:8px;cursor:pointer}
    .burger .line{display:block;width:26px;height:2px;background:#133029;margin:6px 0;border-radius:2px}
    .mb-menu-wrap{position:fixed;left:0;right:0;top:56px;z-index:59;transform:translateY(-12px);opacity:0;pointer-events:none;transition:.25s}
    .mb-menu-wrap.show{transform:none;opacity:1;pointer-events:auto}
    .mb-menu{max-width:1120px;margin:0 auto;background:#fff;border:1px solid #e7ede7;border-top:0;border-radius:0 0 14px 14px;box-shadow:var(--shadow);overflow:hidden}
    .mb-menu a{display:block;padding:16px;border-top:1px solid #eef4ef;font-weight:600}
    .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.18);z-index:58;opacity:0;pointer-events:none;transition:.25s}
    .backdrop.show{opacity:1;pointer-events:auto}

    .section{max-width:1120px;margin:0 auto;padding:24px 16px}
    .paper{background:#fff;border:1px solid var(--ring);border-radius:16px;box-shadow:var(--shadow);padding:16px}
    h2{margin:0 0 10px}
    .grid{display:grid;gap:12px}
    .item{border:1px solid var(--ring);border-radius:12px;padding:12px;background:#fff}
    footer{background:linear-gradient(180deg,var(--bg-bottom),#9ed7b1);margin-top:40px;color:#0b3f33}
    footer .wrap{max-width:1120px;margin:0 auto;padding:20px;text-align:center}
    @media (max-width:840px){.navlinks{display:none}.burger{display:block}}
  </style>
</head>
<body>
<!-- NAV -->
<header>
  <div class="nav">
    <div class="logo"><img src="images/logo.png" alt="KATA logo"><b>KATA</b></div>
    <button class="nav-toggle" id="navToggle">☰</button>
    <div class="navlinks" id="navLinks">
      <a href="index.html" class="active">Home</a>
      <a href="daily.html">Daily Lokal</a>
      <a href="bumi.html">Bumi Words</a>
      <a href="legenda.html">LegendaQu</a>
      <a href="auth.html">Account</a>
    </div>
  </div>
</header>
      <button class="burger" id="mbTrigger"><span class="line"></span><span class="line"></span><span class="line"></span></button>
    </div>
    <div id="mbWrap" class="mb-menu-wrap">
      <nav class="mb-menu">
        <a href="index.html">Home</a>
        <a href="daily.html">Daily Lokal</a>
        <a href="bumi.html">Bumi Words</a>
        <a href="legenda.html">LegendaQu</a>
        <a href="auth.html">Account</a>
      </nav>
    </div>
  </header>
  <div id="backdrop" class="backdrop"></div>

  <section class="section">
    <h2 id="title">Category</h2>
    <div class="paper">
      <div id="desc" style="margin-bottom:8px;color:#5f6f66"></div>
      <div class="grid" id="items"></div>
      <div style="margin-top:10px"><a class="item" style="display:inline-block" href="bumi.html">← Back</a></div>
    </div>
  </section>

  <footer><div class="wrap">© 2025 KATA</div></footer>

  <script>
    // mobile dropdown
    const t=document.getElementById('mbTrigger'), w=document.getElementById('mbWrap'), b=document.getElementById('backdrop');
    const toggle=()=>{const o=w.classList.toggle('show'); b.classList.toggle('show',o); document.body.style.overflow=o?'hidden':''}
    t.addEventListener('click',toggle); b.addEventListener('click',toggle);

    // read query
    const p=new URL(location.href).searchParams.get('cat')||'traditions';
    const meta={
      traditions:{title:'Traditional Traditions',desc:'Celebrations, regional events, etc.'},
      performing:{title:'Clothing & Performing Arts',desc:'Clothing, dance, music, folk theater.'},
      foods:{title:'Typical Foods',desc:'Traditional regional cuisine.'},
      stories:{title:'Traditional Stories & Games',desc:'Fairy tales, legends, local games.'}
    };
    const m=meta[p]||meta.traditions;
    document.getElementById('title').textContent=m.title;
    document.getElementById('desc').textContent=m.desc;

    // placeholder items (silakan ganti konten sesuai data)
    const sample=[ 'Item 1','Item 2','Item 3','Item 4','Item 5'];
    const box=document.getElementById('items');
    sample.forEach(v=>{
      const d=document.createElement('div'); d.className='item'; d.textContent=v; box.appendChild(d);
    });
  </script>
</body>
</html>
